name: ci

on:
  pull_request:
  workflow_dispatch:
  push:
    branches:
      - main
      - "codex/**"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Lint
        run: python -m ruff check .

      - name: Test
        run: python -m pytest

      - name: Deterministic eval
        run: python scripts/run_evals.py

      - name: Demo reset smoke
        run: python scripts/demo_reset.py

      - name: Docker build
        run: docker build -t ai-flowops .
